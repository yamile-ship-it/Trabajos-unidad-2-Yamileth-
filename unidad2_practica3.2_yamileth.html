<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    p {
   /* palabra clave */
 color: blue;

/*  codigo hexadecimal (6 digitos) */
color: #4a90e2; /* azul claro */

/* codigo hexadecimal (3 digitos) */
color: #4ae; /* equivale a #44aaee */

/* RGB (Red, Green, Blue) */
color: rgb(74, 144, 226);

/* RGBA (con transparencia) */
color: rgba(74, 144, 226, 0.7); /* 0.7 es la opacidad (70%) */

/* HSL (Hue, Saturacion, Lightness) */
color: hsl(210, 75%, 59%, 0.7);

/*HSLA (con transparencia) */
color: hsla(210, 75%, 59%, 0.7);

/* color de fondo */
background-color: #f0f7ff;  /* azul muy claro */ 

/* color borde */
border: 1px solid #2e7d32; /* verde esmeralda */
}
    </style>
    </head>
    <body>
      <p>Yammi lala</p>  
</body>
</html>
