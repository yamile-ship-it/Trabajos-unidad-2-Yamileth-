<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            display: inline-block; /* Híbrido entre block e inline */
            width: 150px;
            height: 100px;
            background-color: lightcoral;
            border: 2px solid red;
            margin: 15px;
            padding: 10px;
            
            /* Alineación vertical */
            vertical-align: top; /* o middle, bottom */
            
            /* Control de desbordamiento */
            overflow: hidden; /* oculta el contenido que sobra */
        }
    </style>
</head>
<body>
    <div>
        Caja 1: Este es un ejemplo de inline-block.
    </div>
    <div>
        Caja 2: Permite dimensiones y márgenes.
    </div>
    <div>
        Caja 3: Se alinean una al lado de la otra.
    </div>
</body>
</html>
