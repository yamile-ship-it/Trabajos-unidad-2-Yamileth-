<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <style>
    p{
        /* Familia tipografica */
        font-family: ´Arial´, sans-serif;
        /* Tamaño de fuente */
        font-size: 16px; /* o 1em, 100%, 1rem */
        /* grosor de la fuente */
        font-weight: normal; /* o bold, 100-900 */
        /* estilo de la fuente */
        font-style: normal; /* o italic, oblique */
        /* transformaticion de texto */
        text-transform: none; /* o upprcase, lowercase, capitalize */
        /* decoracion del texto */
        text-decoration: none; /* o underline, line-through, overline */
        /* alineacion del texto */
        text-align: left; /* o center, right, justify */
        /* altura de linea */ 
        line-height: 1.5;
        /* espaciado entre letras */
        letter-spacing: 1px;
        /* espacio entre palabras*/
        word-spacing: 2px;
    }
  </style>
    
   
</body>
<p>mi primera caja de contenido</p>
</html>
