<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
  p {
    /* familia tipografica */
    font-family: 'Arial', sans-serif;

    /* Tamaño de la fuente */
    font-size: 16px; /* o 1em 100% 1rem */

    /* grosor de la fuente */
    font-weight: normal; /* o bold, 100-900 */

    /* estilo de la fuente */
    font-style: normal; /* o italic, oblique */
    
    /* transformacion de texto */  
    text-transform: none;/* o uppercase, lowercase, capitalize */

    /* decoracion de texto */
    text-decoration: none; /* underline, line-throough, overline */ 
    
    /* alineacion de texto */
    text-align: left; /* o center, right, jusrify*/

    /* altura de linea */
    line-height: 1.5;

    /* espacio entre letras */
    letter-spacing: 1px;

    /* espaciado entre palabras */
    word-spacing: 2px;
    color: blue;
  }
</style>
  </head>
<body>
    <p>mi cumpleaños es en enero 1</p>  
</body>
</html>
